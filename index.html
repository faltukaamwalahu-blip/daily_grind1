<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#040406"/>
<title>Beast Tracker — Gand Faad Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #040406;
    --card: #0c0d14;
    --card-surface: #141622;
    --border: rgba(255, 51, 58, 0.15);
    --border-bright: rgba(255, 51, 58, 0.4);
    --text: #f5f6fa;
    --text-muted: #7e8494;
    --red: #ff333a;
    --red-glow: rgba(255, 51, 58, 0.12);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 12px;
  }
  
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(circle at 50% 0%, rgba(255,51,58,0.12) 0%, transparent 50%);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: 90px;
    font-size: 14px;
    line-height: 1.5;
  }

  .app { width: 100%; max-width: 480px; margin: 0 auto; padding: 16px 12px; }

  /* LOGO HERO */
  .hero-card {
    background: linear-gradient(180deg, var(--card) 0%, #08090e 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .logo-wrap { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 1.5px; line-height: 1; }
  .logo span { color: var(--red); text-shadow: 0 0 10px rgba(255,51,58,0.5); }
  .streak-pill {
    background: var(--red-glow);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    color: #ff8084;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* STICKY BOTTOM TABS MOTO-LAYOUT */
  .tabs {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(12, 13, 20, 0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    transition: color 0.2s, transform 0.1s;
    padding: 6px 0;
  }
  .tab i { font-size: 20px; transition: transform 0.2s; }
  .tab.active { color: var(--red); }
  .tab.active i { transform: translateY(-2px); }

  .section { display: none; animation: fadeIn 0.25s ease-out; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* DATE NAVIGATION ENGINE */
  .date-nav { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 16px; }
  .date-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); font-size: 18px; cursor: pointer;
  }
  .date-label { font-size: 14px; font-weight: 700; text-align: center; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
  .today-btn { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 16px; height: 44px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; }

  /* HUD PERFORMANCE METRICS */
  .score-bar {
    background: #090a10;
    border-left: 4px solid var(--red);
    border-radius: var(--radius);
    padding: 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: var(--shadow);
  }
  .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; line-height: 1; color: var(--text); }
  .score-num sub { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; color: var(--text-muted); font-weight: 400; }
  .progress-wrap { flex: 1; }
  .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: var(--red); box-shadow: 0 0 8px var(--red); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .progress-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .rating-badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .rating-beast { background: var(--red-glow); color: var(--red); border: 1px solid var(--border-bright); }
  .rating-solid { background: rgba(234,179,8,0.1); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
  .rating-weak { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); }

  /* CORE CHIPS (SOPs) */
  .sop-section { margin-bottom: 20px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
  .sop-items { display: flex; flex-direction: column; gap: 8px; }
  .sop-chip {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05);
    background: var(--card); font-size: 13px; font-weight: 500; color: var(--text);
    transition: all 0.2s; min-height: 44px;
  }
  .sop-chip.done { border-color: var(--border-bright); background: var(--red-glow); color: #ff8084; }
  .sop-chip i { font-size: 16px; }

  /* COLLAPSIBLE ROUTINE ENGINE */
  .phase-block { background: var(--card); border: 1px solid rgba(255,255,255,0.04); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .phase-block.open { border-color: var(--border); }
  .phase-head { display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer; }
  .ph-num { width: 26px; height: 26px; border-radius: 6px; background: rgba(255,51,58,0.1); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--red); flex-shrink: 0; }
  .ph-info { flex: 1; min-width: 0; }
  .ph-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ph-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .ph-meta { text-align: right; margin-right: 4px; }
  .ph-check { font-size: 12px; font-weight: 700; color: var(--text); }
  .ph-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; }
  .phase-block.open .ph-arrow { transform: rotate(180deg); color: var(--red); }
  .phase-tasks { display: none; padding: 0 14px 14px; background: #090a10; border-top: 1px solid rgba(255,255,255,0.03); }
  .phase-block.open .phase-tasks { display: block; }

  /* TOUCH FRIENDLY LISTS */
  .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .task-row:last-of-type { border-bottom: none; }
  .task-cb { width: 22px; height: 22px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; flex-shrink: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-cb.done { background: var(--red); border-color: var(--red); box-shadow: 0 0 8px rgba(255,51,58,0.4); }
  .task-cb.done::after { content: ''; display: block; width: 4px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }
  .task-text-wrap { flex: 1; min-width: 0; }
  .task-text { font-size: 13px; line-height: 1.5; color: var(--text); overflow-wrap: break-word; }
  .task-text.done { text-decoration: line-through; color: var(--text-muted); }
  .task-del { font-size: 16px; color: var(--text-muted); cursor: pointer; padding: 4px; margin-top: -4px; }

  /* AGGRESSIVE DYNAMIC ADD BUTTONS */
  .add-task-row { display: flex; gap: 8px; margin-top: 12px; }
  .add-task-row input, .add-edit-row input { flex: 1; font-size: 13px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
  .add-task-row input:focus, .add-edit-row input:focus { border-color: var(--border-bright); }
  .add-task-row button, .add-edit-row button { background: var(--card-surface); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; }

  /* JOURNAL TEXTAREA */
  .notes-wrap { margin-top: 24px; }
  .notes-wrap textarea { width: 100%; font-size: 13px; padding: 12px; border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); background: var(--card); color: var(--text); resize: none; min-height: 100px; font-family: inherit; outline: none; line-height: 1.5; }
  .notes-wrap textarea:focus { border-color: var(--border-bright); }

  /* DIALED CALENDAR DESIGN WITH PERCENTS */
  .cal-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month-nav span { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .cal-month-nav button { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); width: 40px; height: 40px; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
  .cal-head-cell { font-size: 10px; font-weight: 700; color: var(--text-muted); text-align: center; text-transform: uppercase; padding-bottom: 4px; }
  .cal-cell { aspect-ratio: 1; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); font-size: 14px; font-weight: 600; color: var(--text-muted); position: relative; cursor: pointer; padding: 2px; }
  .cal-cell span { line-height: 1.1; }
  .cal-pct { font-size: 9px; font-weight: 700; color: var(--text-muted); margin-top: 2px; opacity: 0.85; }
  .cal-cell.today { border: 1px solid var(--border-bright); color: var(--text); }
  .cal-cell.selected { background: var(--red-glow); border-color: var(--red); color: var(--text); }
  .cal-cell.beast-day { background: rgba(255, 51, 58, 0.2); border-color: var(--border-bright); color: #ff5258; }
  .cal-cell.beast-day .cal-pct { color: #ffa3a6; }
  .cal-cell.has-data { color: var(--text); }
  .cal-cell.has-data .cal-pct { color: rgba(255,255,255,0.6); }
  .cal-cell.empty { opacity: 0; pointer-events: none; }

  /* DETAILED CALENDAR CARD INTERACTIVE DAY HUD */
  .day-detail { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 16px; box-shadow: var(--shadow); }
  .day-detail-title { font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
  .day-detail-stat { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .day-detail-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .day-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; }
  .day-card h4 { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
  .day-task-list { display: flex; flex-direction: column; gap: 4px; }
  .day-task-item { display: flex; gap: 8px; font-size: 12px; color: var(--text); }
  .day-task-item.done { color: var(--text-muted); text-decoration: line-through; }
  .day-task-bullet { width: 5px; height: 5px; border-radius: 50%; background: var(--red); margin-top: 6px; flex-shrink: 0; }
  .day-detail-notes { font-size: 12px; color: var(--text-muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-style: italic; }

  /* MANAGEMENT SCHEDULE ENGINE (EDIT) */
  .edit-section { background: var(--card); border: 1px solid rgba(255,255,255,0.04); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .edit-phase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ep-num { background: rgba(255,51,58,0.1); border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700; color: var(--red); }
  .ep-name-input { flex: 1; font-size: 13px; font-weight: 600; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text); outline: none; padding: 4px 0; font-family: inherit; }
  .ep-name-input:focus { border-bottom-color: var(--red); }
  .ep-time-input { width: 90px; font-size: 11px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); outline: none; text-align: right; font-family: inherit; }
  .ep-time-input:focus { border-bottom-color: var(--red); }
  .edit-task-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; background: #090a10; border-radius: 8px; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.02); }
  .edit-task-row input { flex: 1; font-size: 12px; background: transparent; border: none; color: var(--text); outline: none; font-family: inherit; }
  .edit-task-row .del-btn { cursor: pointer; color: var(--text-muted); padding: 2px; }

  .action-buttons { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 16px; }
  .save-btn { background: var(--red); color: #fff; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(255,51,58,0.3); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .reset-btn { background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 12px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }

  /* DYNAMIC HUD SYSTEM TOAST */
  .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(40px); background: #11131c; border: 1px solid var(--border-bright); border-radius: 30px; padding: 10px 24px; font-size: 12px; font-weight: 600; color: #ff8084; opacity: 0; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; pointer-events: none; box-shadow: var(--shadow); white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hero-card">
      <div class="logo-wrap">
        <div>
          <div class="logo"><span>⚔</span> BEAST TRACKER</div>
        </div>
        <div class="streak-pill"><i class="ti ti-flame"></i> <span id="streakNum">0</span> DAY STREAK</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today',this)"><i class="ti ti-calendar-event"></i>Today</button>
    <button class="tab" onclick="showTab('calendar',this)"><i class="ti ti-calendar"></i>Calendar</button>
    <button class="tab" onclick="showTab('edit',this)"><i class="ti ti-settings"></i>Edit Routine</button>
  </div>

  <div id="tab-today" class="section active">
    <div class="date-nav">
      <button onclick="changeDay(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="date-label" id="dateLabelToday"></div>
      <button class="today-btn" onclick="goToday()">TODAY</button>
      <button onclick="changeDay(1)"><i class="ti ti-chevron-right"></i></button>
    </div>

    <div class="score-bar">
      <div class="score-num" id="scoreNum">0 <sub>/ 0</sub></div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
        <div class="progress-label" id="progLabel">Start checking off tasks</div>
      </div>
      <div class="rating-badge rating-weak" id="ratingBadge">Not started</div>
    </div>

    <div class="sop-section">
      <div class="section-label">DAILY SOPs</div>
      <div class="sop-items" id="sopItems"></div>
    </div>

    <div id="phasesContainer"></div>

    <div class="notes-wrap">
      <div class="section-label">DAILY JOURNAL</div>
      <textarea id="notesArea" placeholder="Aaj ka reflection... kya achieve kiya, kya miss hua..." onchange="saveNotes()"></textarea>
    </div>
  </div>

  <div id="tab-calendar" class="section">
    <div class="cal-month-nav">
      <button onclick="calNav(-1)"><i class="ti ti-chevron-left"></i></button>
      <span id="calMonthLabel"></span>
      <button onclick="calNav(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="day-detail" id="dayDetail" style="display:none"></div>
  </div>

  <div id="tab-edit" class="section">
    <div id="editPhasesContainer"></div>
    <div class="action-buttons">
      <button class="save-btn" onclick="saveSchedule()"><i class="ti ti-device-floppy"></i> Save Routine</button>
      <button class="reset-btn" onclick="resetDefault()">Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_SCHEDULE = [
  {name:"System Shock",time:"05:00–08:30",tasks:[
    {t:"05:00 — Alarm bajte hi uthna, 1 second nahi sochna",done:false},
    {t:"05:10 — Thanda paani muh par, 2 gilaas paani peena",done:false},
    {t:"05:30–07:00 — 5KM run ya 100 pushups+squats circuit",done:false},
    {t:"07:30–08:30 — Thande paani se naha, taiyaar ho",done:false}
  ]},
  {name:"8th House Grind",time:"09:00–01:30",tasks:[
    {t:"09:00 — Library mein entry, phone airplane mode",done:false},
    {t:"09:00–12:30 — LeetCode Medium/Hard: Graphs, DP, Trees",done:false},
    {t:"12:30–01:30 — OS, DBMS, Computer Networks revision",done:false}
  ]},
  {name:"Pitta Control",time:"01:30–03:00",tasks:[
    {t:"01:30 — Saada khana + ek gilaas chaach",done:false},
    {t:"02:00–03:00 — 30 min brain cache clear (eyes closed)",done:false}
  ]},
  {name:"Hunt & Architecture",time:"03:00–06:30",tasks:[
    {t:"03:00–05:00 — System Design: HLD/LLD study",done:false},
    {t:"05:00–06:30 — Apply to 25 companies (Naukri, Instahyre, Wellfound)",done:false}
  ]},
  {name:"The Provider",time:"07:00–09:30",tasks:[
    {t:"07:00–08:30 — Papa ke paas baithna, confidence dena",done:false},
    {t:"08:30–09:30 — Halka dinner + 15 min walk",done:false}
  ]},
  {name:"Shutdown",time:"09:30–10:00",tasks:[
    {t:"09:30 — Phone & laptop doosre kamre mein",done:false},
    {t:"09:40 — Journal mein likhna: aaj 10LPA ke liye kya kiya",done:false},
    {t:"10:00 — Aankhein band, neend",done:false}
  ]}
];

const SOPS = ["Zero inbox refreshing","Zero relapse — stay clean","No complaining — warrior mode"];

let viewDate = todayKey();
let calYear, calMonth, selectedCalDate = null;
let editSchedule = [];

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getSchedule(){
  try{const s=localStorage.getItem('bf_schedule');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));}
  catch(e){return JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));}
}

function getData(key){
  try{const d=localStorage.getItem('bf_day_'+key);return d?JSON.parse(d):null;}
  catch(e){return null;}
}

function saveData(key,data){
  try{localStorage.setItem('bf_day_'+key,JSON.stringify(data));}catch(e){}
}

function getOrCreate(key){
  let d=getData(key);
  if(!d){
    const sched=getSchedule();
    d={phases:JSON.parse(JSON.stringify(sched)),sops:[false,false,false],notes:''};
  }
  return d;
}

function calcScore(data){
  let done=0,total=0;
  data.phases.forEach(p=>p.tasks.forEach(t=>{total++;if(t.done)done++;}));
  data.sops.forEach(s=>{total++;if(s)done++;});
  return{done,total};
}

function getRating(pct){
  if(pct>=85)return{cls:'rating-beast',label:'Beast Mode'};
  if(pct>=60)return{cls:'rating-solid',label:'Solid Day'};
  if(pct>0)return{cls:'rating-weak',label:'Work More'};
  return{cls:'rating-weak',label:'Not started'};
}

function calcStreak(){
  let streak=0;
  const d=new Date();
  while(true){
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const data=getData(k);
    if(!data){if(k===todayKey()){d.setDate(d.getDate()-1);continue;}break;}
    const{done,total}=calcScore(data);
    if(total===0||done/total<0.6)break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function renderToday(){
  const data=getOrCreate(viewDate);
  const{done,total}=calcScore(data);
  const pct=total>0?Math.round(done/total*100):0;
  const rating=getRating(pct);

  document.getElementById('scoreNum').innerHTML=done+' <sub>/ '+total+'</sub>';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=pct+'% complete — '+done+' tasks done';
  const rb=document.getElementById('ratingBadge');
  rb.className='rating-badge '+rating.cls;
  rb.textContent=rating.label;

  const d=new Date(viewDate+'T00:00:00');
  document.getElementById('dateLabelToday').textContent=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});

  const sopEl=document.getElementById('sopItems');
  sopEl.innerHTML='';
  SOPS.forEach((s,i)=>{
    const ch=document.createElement('div');
    ch.className='sop-chip'+(data.sops[i]?' done':'');
    ch.innerHTML=(data.sops[i]?'<i class="ti ti-square-check-filled"></i>':'<i class="ti ti-square"></i>')+' '+s;
    ch.onclick=()=>{data.sops[i]=!data.sops[i];saveData(viewDate,data);renderToday();renderStreak();};
    sopEl.appendChild(ch);
  });

  const pc=document.getElementById('phasesContainer');
  pc.innerHTML='';
  data.phases.forEach((ph,pi)=>{
    const pDone=ph.tasks.filter(t=>t.done).length;
    const div=document.createElement('div');
    div.className='phase-block'+(pi===0?' open':'');
    div.innerHTML=`<div class="phase-head" onclick="togglePhase(this.parentElement)">
      <div class="ph-num">${pi+1}</div>
      <div class="ph-info">
        <div class="ph-title">${ph.name}</div>
        <div class="ph-time">${ph.time}</div>
      </div>
      <div class="ph-meta">
        <div class="ph-check">${pDone}/${ph.tasks.length}</div>
      </div>
      <i class="ti ti-chevron-down ph-arrow"></i>
    </div>
    <div class="phase-tasks">
      ${ph.tasks.map((t,ti)=>`<div class="task-row">
        <div class="task-cb${t.done?' done':''}" onclick="toggleTask(${pi},${ti})"></div>
        <div class="task-text-wrap" onclick="toggleTask(${pi},${ti})">
          <div class="task-text${t.done?' done':''}">${t.t}</div>
        </div>
        <span class="task-del" onclick="delTask(${pi},${ti})"><i class="ti ti-trash"></i></span>
      </div>`).join('')}
      <div class="add-task-row">
        <input type="text" placeholder="Add task to this phase..." id="addInp${pi}" onkeydown="if(event.key==='Enter')addTask(${pi})"/>
        <button onclick="addTask(${pi})"><i class="ti ti-plus"></i></button>
      </div>
    </div>`;
    pc.appendChild(div);
  });

  document.getElementById('notesArea').value=data.notes||'';
  document.getElementById('streakNum').textContent=calcStreak();
}

function togglePhase(el){el.classList.toggle('open');}

function toggleTask(pi,ti){
  const data=getOrCreate(viewDate);
  data.phases[pi].tasks[ti].done=!data.phases[pi].tasks[ti].done;
  saveData(viewDate,data);renderToday();
}

function delTask(pi,ti){
  const data=getOrCreate(viewDate);
  data.phases[pi].tasks.splice(ti,1);
  saveData(viewDate,data);renderToday();
}

function addTask(pi){
  const inp=document.getElementById('addInp'+pi);
  const val=inp.value.trim();
  if(!val)return;
  const data=getOrCreate(viewDate);
  data.phases[pi].tasks.push({t:val,done:false});
  saveData(viewDate,data);inp.value='';renderToday();
}

function saveNotes(){
  const data=getOrCreate(viewDate);
  data.notes=document.getElementById('notesArea').value;
  saveData(viewDate,data);
}

function changeDay(n){
  const d=new Date(viewDate+'T00:00:00');
  d.setDate(d.getDate()+n);
  viewDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderToday();
}

function goTodayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function goToday(){viewDate=goTodayKey();renderToday();}

function renderStreak(){document.getElementById('streakNum').textContent=calcStreak();}

function showTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='calendar')renderCal();
  if(name==='edit')renderEdit();
}

function initCal(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}

function calNav(n){
  calMonth+=n;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}

function renderCal(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent=months[calMonth]+' '+calYear;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{
    const h=document.createElement('div');h.className='cal-head-cell';h.textContent=d;grid.appendChild(h);
  });
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=goTodayKey();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
  for(let day=1;day<=days;day++){
    const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const data=getData(key);
    const cell=document.createElement('div');
    let cls='cal-cell';
    let displayPct = '';
    
    if(key===today)cls+=' today';
    if(key===selectedCalDate)cls+=' selected';
    if(data){
      const{done,total}=calcScore(data);
      const pct=total>0?Math.round((done/total)*100):0;
      displayPct = `<span class="cal-pct">${pct}%</span>`;
      cls+=pct>=85?' beast-day':' has-data';
    }
    cell.className=cls;
    cell.innerHTML='<span>'+day+'</span>' + displayPct;
    cell.onclick=()=>showDayDetail(key);
    grid.appendChild(cell);
  }
}

function showDayDetail(key){
  selectedCalDate=key;
  renderCal();
  const data=getOrCreate(key);
  const detail=document.getElementById('dayDetail');
  detail.style.display='block';
  const d=new Date(key+'T00:00:00');
  const dayLabel=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  const{done,total}=calcScore(data);
  const pct=total>0?Math.round(done/total*100):0;
  const rating=getRating(pct);
  const sopDone=data.sops.filter(Boolean).length;
  const tasksHtml=data.phases.map((phase,pi)=>`<div class="day-card"><h4>${phase.name} · ${phase.time}</h4><div class="day-task-list">${phase.tasks.map((task,ti)=>`<div class="day-task-item${task.done?' done':''}"><span class="day-task-bullet"></span><span class="day-task-label">${task.t}</span></div>`).join('')}</div></div>`).join('');
  detail.innerHTML=`<div class="day-detail-title">${dayLabel}</div>
    <div class="day-detail-stat"><i class="ti ti-checklist" style="font-size:14px;color:var(--red)"></i> Tasks: ${done}/${total} (${pct}%) <span class="rating-badge ${rating.cls}" style="margin-left:auto">${rating.label}</span></div>
    <div class="day-detail-stat"><i class="ti ti-shield-check" style="font-size:14px;color:var(--red)"></i> SOPs completed: ${sopDone}/3</div>
    <div class="day-detail-grid">${tasksHtml}</div>
    ${data.notes?`<div class="day-detail-notes"><i class="ti ti-notebook" style="margin-right:5px"></i>"${data.notes}"</div>`:''}`;
}

function renderEdit(){
  const sched=getSchedule();
  editSchedule=JSON.parse(JSON.stringify(sched));
  const c=document.getElementById('editPhasesContainer');
  c.innerHTML='';
  editSchedule.forEach((ph,pi)=>{
    const wrap=document.createElement('div');
    wrap.className='edit-section';
    const header=document.createElement('div');
    header.className='edit-phase-header';
    header.innerHTML=`<span class="ep-num">${pi+1}</span>
      <input class="ep-name-input" type="text" value="${ph.name}" id="pname${pi}" placeholder="Phase name"/>
      <input class="ep-time-input" type="text" value="${ph.time}" id="ptime${pi}" placeholder="time"/>`;
    wrap.appendChild(header);

    const taskWrap=document.createElement('div');
    ph.tasks.forEach((t,ti)=>{
      const row=document.createElement('div');
      row.className='edit-task-row';
      row.innerHTML=`<input type="text" value="${t.t}" id="ptask${pi}_${ti}"/>
        <span class="del-btn" onclick="removeEditTask(${pi},${ti})"><i class="ti ti-x"></i></span>`;
      taskWrap.appendChild(row);
    });
    wrap.appendChild(taskWrap);

    const addRow=document.createElement('div');
    addRow.className='add-edit-row';
    addRow.innerHTML=`<input type="text" placeholder="Add task to this phase..." id="editAddInp${pi}" onkeydown="if(event.key==='Enter')addEditTask(${pi})"/>
      <button onclick="addEditTask(${pi})"><i class="ti ti-plus"></i></button>`;
    wrap.appendChild(addRow);
    c.appendChild(wrap);
  });
}

function removeEditTask(pi,ti){
  editSchedule[pi].tasks.splice(ti,1);renderEdit();
}

function addEditTask(pi){
  const inp=document.getElementById('editAddInp'+pi);
  const val=inp.value.trim();
  if(!val)return;
  editSchedule[pi].tasks.push({t:val,done:false});
  renderEdit();
}

function saveSchedule(){
  editSchedule.forEach((ph,pi)=>{
    const nameEl=document.getElementById('pname'+pi);
    const timeEl=document.getElementById('ptime'+pi);
    if(nameEl)ph.name=nameEl.value;
    if(timeEl)ph.time=timeEl.value;
    ph.tasks.forEach((t,ti)=>{
      const el=document.getElementById('ptask'+pi+'_'+ti);
      if(el)t.t=el.value;
    });
  });
  try{localStorage.setItem('bf_schedule',JSON.stringify(editSchedule));}catch(e){}
  showToast('Schedule saved!');
}

function resetDefault(){
  if(confirm('Reset schedule to default Gand Faad Routine?')){
    try{localStorage.removeItem('bf_schedule');}catch(e){}
    renderEdit();
    showToast('Reset to default!');
  }
}

initCal();
renderToday();
</script>
</body>
</html>
